<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XDataHub V2</title>
    <!-- 初始主题检测：在 CSS 渲染前设置 data-theme，防止 FIoT -->
    <script>
    (function() {
        var saved = localStorage.getItem('XDataHub.V2.Theme');
        if (saved === 'light' || saved === 'dark') {
            document.body.dataset.theme = saved;
        }
    })();
    </script>
    <link rel="stylesheet" href="xdatahub-color-tokens.css?v=20260506-3">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: var(--xdh-color-background, #121212);
            color: var(--xdh-color-text-primary, #ffffff);
            font-family: var(--font-family-base, system-ui, sans-serif);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav bar spans full width above the sidebar+content area */
        xdh-content-nav {
            flex-shrink: 0;
        }

        /* layout-container sits below the nav bar */
        .layout-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            container-type: inline-size;
            container-name: layout;
        }

        .main-scroll {
            flex: 1;
            min-width: 0;
            overflow-y: scroll;
            overflow-x: hidden;
            background: var(--xdh-color-background);
            container-type: inline-size;
            container-name: main;
            scrollbar-gutter: stable;
            /* Firefox 标准属性 */
            scrollbar-width: auto;
            scrollbar-color: var(--xdh-scrollbar-thumb, #555)
                var(--xdh-scrollbar-track, transparent);
        }
        /* Chromium 精确控制 */
        .main-scroll::-webkit-scrollbar {
            width: 15px;
        }
        .main-scroll::-webkit-scrollbar-track {
            background: var(--xdh-scrollbar-track, transparent);
        }
        .main-scroll::-webkit-scrollbar-thumb {
            background: var(--xdh-scrollbar-thumb, #555);
            border-radius: 4px;
        }
        .main-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--xdh-scrollbar-thumb-hover, #777);
        }
        .main-scroll::-webkit-scrollbar-corner {
            background: transparent;
        }

        xdh-pagination {
            flex-shrink: 0;
        }

        .content-stage {
            position: relative;
            display: flex;
            flex: 1;
            min-height: 0;
            flex-direction: column;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <xdh-content-nav></xdh-content-nav>
    <div id="xdh-content-stage" class="content-stage">
        <div class="layout-container">
            <xdh-sidebar-filter></xdh-sidebar-filter>
            <xdh-folder-tree></xdh-folder-tree>
            <div class="main-scroll">
                <xdh-media-grid></xdh-media-grid>
                <xdh-history-view></xdh-history-view>
            </div>
        </div>
        <xdh-pagination></xdh-pagination>
    </div>

    <!-- 浮动层（fixed 定位，不影响页面流） -->
    <xdh-staging-dock></xdh-staging-dock>
    <xdh-lightbox></xdh-lightbox>
    <xdh-lora-detail></xdh-lora-detail>
    <xdh-banner></xdh-banner>
    <xdh-settings-dialog></xdh-settings-dialog>

    <!-- ES Module Entry -->
    <script type="module" src="xdatahub_app_v2.js?v=20260506-3"></script>
</body>
</html>
